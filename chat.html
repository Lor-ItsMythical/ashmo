<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHMO · Class Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4a843;
  --dark: #111114;
  --panel: #1a1a1f;
  --border: rgba(212,168,67,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--dark);
  color: #fff;
  font-family: 'Space Mono', monospace;
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 700px;
  margin: 0 auto;
}

/* TOPBAR */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.back-btn {
  color: var(--gold);
  font-size: 12px;
  text-decoration: none;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.back-btn:hover { opacity: 0.7; }
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.08em;
  flex: 1;
  text-align: center;
}
.topbar-title span { color: var(--gold); }
.online-pill {
  display: none;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  white-space: nowrap;
}
.online-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #2ecc71;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* NAME SCREEN */
#screen-name {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  overflow-y: auto;
}
.name-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.name-card h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.06em;
  color: var(--gold);
}
.name-card p { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.7; }
.name-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.name-input::placeholder { color: rgba(255,255,255,0.25); }
.name-input:focus { border-color: var(--gold); }
.chips { display: flex; flex-wrap: wrap; gap: 7px; }
.chip {
  background: rgba(212,168,67,0.08);
  border: 1px solid rgba(212,168,67,0.2);
  color: var(--gold);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  transition: background 0.15s;
}
.chip:hover, .chip.active { background: rgba(212,168,67,0.2); border-color: var(--gold); }
.btn-join {
  width: 100%;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-join:hover { opacity: 0.88; }

/* CHAT SCREEN */
#screen-chat {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* MESSAGES */
#msgs {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px 14px 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.msg-ph {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex: 1;
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  text-align: center;
  padding: 40px;
  min-height: 120px;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid rgba(212,168,67,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.msg-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
  max-width: 80%;
  animation: fadeUp 0.18s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.msg-row.mine { align-self: flex-end; align-items: flex-end; }
.msg-row.theirs { align-self: flex-start; align-items: flex-start; }

.msg-sender { font-size: 9px; color: rgba(255,255,255,0.3); padding: 0 4px; }
.msg-row.mine .msg-sender { color: rgba(212,168,67,0.5); }

/* reply quote */
.reply-quote {
  border-left: 3px solid rgba(212,168,67,0.8);
  background: rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 6px 10px 5px;
  margin-bottom: 4px;
  max-width: 100%;
}
.msg-row.mine .reply-quote {
  border-color: rgba(212,168,67,0.6);
  background: rgba(255,255,255,0.07);
}
.reply-quote-name {
  font-size: 9px;
  color: var(--gold);
  margin-bottom: 2px;
  letter-spacing: 0.04em;
}
.msg-row.mine .reply-quote-name { color: var(--gold); }
.reply-quote-text {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 260px;
}
.msg-row.mine .reply-quote-text { color: rgba(255,255,255,0.5); }

.msg-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  max-width: 100%;
}
.msg-row.mine .msg-wrap { flex-direction: row-reverse; }

.msg-bubble {
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.5;
  word-break: break-word;
}
.msg-row.mine .msg-bubble { background: var(--gold); color: #000; border-bottom-right-radius: 3px; }
.msg-row.theirs .msg-bubble { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.9); border-bottom-left-radius: 3px; }

/* discord-style action buttons */
.reply-btn, .del-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.3);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s, color 0.15s;
  padding: 0;
}
.msg-row:hover .reply-btn,
.msg-row:hover .del-btn { opacity: 1; }
.msg-row.active .reply-btn,
.msg-row.active .del-btn { opacity: 1; }
.msg-row.theirs .reply-btn { opacity: 0.25; }
.msg-row.theirs.active .reply-btn { opacity: 1; }
.msg-row.theirs:hover .reply-btn { opacity: 1; }
.reply-btn:hover { background: rgba(212,168,67,0.15); border-color: rgba(212,168,67,0.35); color: var(--gold); }
.del-btn:hover { background: rgba(231,76,60,0.15); border-color: rgba(231,76,60,0.35); color: #e74c3c; }

/* Delete confirm popup */
.del-confirm {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.del-confirm-box {
  background: #1e1e24;
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 14px;
  padding: 24px 22px;
  max-width: 300px;
  width: 90%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  text-align: center;
}
.del-confirm-box h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 0.06em;
  color: #e74c3c;
}
.del-confirm-box p {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  line-height: 1.7;
}
.del-confirm-actions {
  display: flex;
  gap: 10px;
}
.del-confirm-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: opacity 0.2s;
}
.del-confirm-actions button:hover { opacity: 0.8; }
.btn-cancel-del { background: rgba(255,255,255,0.08); color: #fff; }
.btn-do-del { background: #e74c3c; color: #fff; }

.msg-time { font-size: 9px; color: rgba(255,255,255,0.2); padding: 0 4px; }

.msg-system {
  align-self: center;
  font-size: 10px;
  color: rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 3px 10px;
  margin: 3px 0;
  font-style: italic;
}
.date-sep {
  align-self: center;
  font-size: 9px;
  color: rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 3px 10px;
  margin: 6px 0 3px;
}

/* REPLY BAR */
#reply-bar {
  flex-shrink: 0;
  display: none;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  background: rgba(212,168,67,0.07);
  border-top: 1px solid rgba(212,168,67,0.2);
}
#reply-bar.show { display: flex; }
#rb-info { flex: 1; min-width: 0; }
#rb-name { font-size: 9px; color: var(--gold); margin-bottom: 2px; }
#rb-text { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#reply-cancel { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 16px; cursor: pointer; padding: 2px 6px; flex-shrink: 0; }
#reply-cancel:hover { color: #fff; }

/* INPUT BAR */
#name-tag {
  font-size: 10px;
  color: rgba(212,168,67,0.6);
  white-space: nowrap;
  flex-shrink: 0;
  display: none;
  letter-spacing: 0.03em;
}
.input-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px 13px;
  background: var(--panel);
  border-top: 1px solid var(--border);
}
#msg-input {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 10px 15px;
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  outline: none;
  min-width: 0;
  transition: border-color 0.2s;
}
#msg-input::placeholder { color: rgba(255,255,255,0.22); }
#msg-input:focus { border-color: rgba(212,168,67,0.4); }
#send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--gold);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.15s;
}
#send-btn:hover { opacity: 0.85; }
#send-btn:active { transform: scale(0.92); }

/* ── DESKTOP (wide screen) ── */
@media (min-width: 700px) {
  body {
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .app {
    width: 100%;
    height: calc(100dvh - 40px);
    max-height: 860px;
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(212,168,67,0.06);
  }
  .topbar { border-radius: 20px 20px 0 0; }
}

/* ── LANDSCAPE MOBILE ── */
@media (orientation: landscape) and (max-height: 600px) {
  body {
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
  }
  .app {
    width: 100%;
    max-width: 100%;
    height: calc(100dvh - 16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,0,0,0.6);
  }
  .topbar {
    border-radius: 14px 14px 0 0;
    padding: 8px 16px;
  }
  .topbar-title { font-size: 17px; }
  #msgs { padding: 8px 12px 4px; gap: 2px; }
  .msg-bubble { font-size: 12px; padding: 7px 11px; }
  .input-bar { padding: 6px 10px 8px; }
  #msg-input { padding: 8px 13px; font-size: 12px; }
  #send-btn { width: 36px; height: 36px; }
  .reply-btn, .del-btn { width: 22px; height: 22px; }
}

/* ── SMALL MOBILE ── */
@media (max-width: 480px) {
  .topbar { padding: 11px 14px; }
  .msg-bubble { font-size: 12px; }
  .name-card { padding: 22px 16px; }
}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <a href="index.html" class="back-btn">← Back</a>
    <div class="topbar-title">ASH<span>MO</span> · Chat</div>
    <div class="online-pill" id="online-pill">
      <div class="online-dot"></div>
      <span id="online-count">0 online</span>
    </div>
  </div>

  <div id="screen-name">
    <div class="name-card">
      <div style="font-size:30px">✏️</div>
      <h2>WHO ARE YOU?</h2>
      <p>Pick your display name. Your classmates will see this in the chat.</p>
      <input class="name-input" id="name-input" type="text" placeholder="Your name…" maxlength="20" autocomplete="off" />
      <div>
        <p style="font-size:10px;color:rgba(255,255,255,0.28);margin-bottom:9px">Quick pick:</p>
        <div class="chips">
          <div class="chip" data-name="Ayush">Ayush</div>
          <div class="chip" data-name="Satyam">Satyam</div>
          <div class="chip" data-name="Hemant">Hemant</div>
          <div class="chip" data-name="Kushal">Kushal</div>
          <div class="chip" data-name="Manav">Manav</div>
          <div class="chip" data-name="Om">Om</div>
          <div class="chip" data-name="Tejash">Tejash</div>
          <div class="chip" data-name="Shoban">Shoban</div>
          <div class="chip" data-name="Asher">Asher</div>
        </div>
      </div>
      <button class="btn-join" id="btn-join">Enter Chat ↗</button>
    </div>
  </div>

  <div id="screen-chat">
    <div id="msgs">
      <div class="msg-ph" id="loading-ph">
        <div class="spinner"></div>
        Loading messages…
      </div>
    </div>
    <div id="reply-bar">
      <div id="rb-info">
        <div id="rb-name"></div>
        <div id="rb-text"></div>
      </div>
      <button id="reply-cancel">✕</button>
    </div>
    <div class="input-bar">
      <span id="name-tag"></span>
      <input id="msg-input" type="text" placeholder="Message the class…" maxlength="300" autocomplete="off" />
      <button id="send-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  const NAME_KEY = 'ashmo_chat_name';
  const cfg = {
    apiKey: "AIzaSyC3bpQP-Wd9ZFDCnA8mdCtkqHFNznKJT9Y",
    authDomain: "ashmo-bfa52.firebaseapp.com",
    databaseURL: "https://ashmo-bfa52-default-rtdb.firebaseio.com",
    projectId: "ashmo-bfa52",
    storageBucket: "ashmo-bfa52.firebasestorage.app",
    messagingSenderId: "759282648968",
    appId: "1:759282648968:web:05f8741f493e62e7091c3d"
  };

  const screenName = document.getElementById('screen-name');
  const screenChat = document.getElementById('screen-chat');
  const nameInput  = document.getElementById('name-input');
  const msgsEl     = document.getElementById('msgs');
  const msgInput   = document.getElementById('msg-input');
  const replyBar   = document.getElementById('reply-bar');

  let myName = localStorage.getItem(NAME_KEY) || '';
  let db = null, msgsRef = null, onlineRef = null, myOnlineRef = null;
  let rendered = new Set();
  let lastDate = null;
  let replyTo  = null;

  if (myName) nameInput.value = myName;

  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      nameInput.value = c.dataset.name;
    });
  });

  document.getElementById('btn-join').addEventListener('click', join);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  function join() {
    const v = nameInput.value.trim();
    if (!v) { nameInput.focus(); return; }
    myName = v;
    localStorage.setItem(NAME_KEY, myName);
    go();
  }

  if (myName) go();

  function go() {
    screenName.style.display = 'none';
    screenChat.style.display = 'flex';
    const tag = document.getElementById('name-tag');
    tag.textContent = myName;
    tag.style.display = 'block';
    boot();
    setTimeout(() => msgInput.focus(), 200);
  }

  function boot() {
    if (db) return;
    try {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      db        = firebase.database();
      msgsRef   = db.ref('ashmo/messages');
      onlineRef = db.ref('ashmo/online');
      load();
      presence();
    } catch (err) {
      const ph = document.getElementById('loading-ph');
      if (ph) ph.innerHTML = '<span style="color:rgba(255,80,80,0.8)">Could not connect.</span>';
    }
  }

  function load() {
    const ph = document.getElementById('loading-ph');

    msgsRef.limitToLast(100).once('value')
      .then(snap => {
        if (ph) ph.remove();

        snap.forEach(child => {
          rendered.add(child.key);
          draw(child.val(), child.key);
        });

        if (rendered.size === 0) {
          showEmpty();
        } else {
          scrollDown();
        }

        // Only listen for truly NEW messages after initial load
        msgsRef.limitToLast(1).on('child_added', snap => {
          if (rendered.has(snap.key)) return;
          rendered.add(snap.key);
          const empty = msgsEl.querySelector('.msg-ph');
          if (empty) empty.remove();
          draw(snap.val(), snap.key);
          scrollDown();
        });
      })
      .catch(err => {
        if (ph) ph.innerHTML = '<span style="color:rgba(255,80,80,0.8)">Firebase error: ' + err.message + '</span>';
      });
  }

  function showEmpty() {
    const d = document.createElement('div');
    d.className = 'msg-ph';
    d.innerHTML = '<span style="font-size:26px;opacity:0.3">💬</span><span>No messages yet. Be first!</span>';
    msgsEl.appendChild(d);
  }

  function draw(msg, key) {
    if (!msg) return;

    if (msg.type === 'system') {
      const el = document.createElement('div');
      el.className = 'msg-system';
      el.textContent = msg.text;
      msgsEl.appendChild(el);
      return;
    }

    if (msg.ts) {
      const ds = new Date(msg.ts).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      if (ds !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'date-sep';
        sep.textContent = ds;
        msgsEl.appendChild(sep);
        lastDate = ds;
      }
    }

    const isMine = msg.name === myName;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    const time = msg.ts ? new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

    let quote = '';
    if (msg.replyTo) {
      quote = `<div class="reply-quote">
        <div class="reply-quote-name">${e(msg.replyTo.name)}</div>
        <div class="reply-quote-text">${e(msg.replyTo.text)}</div>
      </div>`;
    }

    const delBtn = isMine ? `<button class="del-btn" title="Delete">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>` : '';

    row.innerHTML =
      `<div class="msg-sender">${e(msg.name)}</div>` +
      quote +
      `<div class="msg-wrap">
        <div class="msg-bubble">${e(msg.text)}</div>
        <button class="reply-btn" title="Reply">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 17 4 12 9 7"/>
            <path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
          </svg>
        </button>
        ${delBtn}
      </div>` +
      `<div class="msg-time">${time}</div>`;

    row.querySelector('.msg-bubble').addEventListener('click', () => {
      const isActive = row.classList.contains('active');
      document.querySelectorAll('.msg-row.active').forEach(r => r.classList.remove('active'));
      if (!isActive) row.classList.add('active');
    });

    row.querySelector('.reply-btn').addEventListener('click', (ev) => {
      ev.stopPropagation();
      row.classList.remove('active');
      setReply(msg);
    });
    if (isMine && key) {
      row.querySelector('.del-btn').addEventListener('click', (ev) => {
        ev.stopPropagation();
        row.classList.remove('active');
        confirmDelete(key, msg.text, row);
      });
    }
    msgsEl.appendChild(row);
  }

  function setReply(msg) {
    replyTo = { name: msg.name, text: msg.text };
    document.getElementById('rb-name').textContent = 'Replying to ' + msg.name;
    document.getElementById('rb-text').textContent = msg.text;
    replyBar.classList.add('show');
    msgInput.focus();
  }

  document.getElementById('reply-cancel').addEventListener('click', () => {
    replyTo = null;
    replyBar.classList.remove('show');
  });

  function confirmDelete(key, text, rowEl) {
    const overlay = document.createElement('div');
    overlay.className = 'del-confirm';
    overlay.innerHTML = `
      <div class="del-confirm-box">
        <h3>Delete Message?</h3>
        <p>"${e(text.length > 60 ? text.slice(0,60)+'…' : text)}"</p>
        <div class="del-confirm-actions">
          <button class="btn-cancel-del">Cancel</button>
          <button class="btn-do-del">Delete</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    overlay.querySelector('.btn-cancel-del').addEventListener('click', () => overlay.remove());
    overlay.querySelector('.btn-do-del').addEventListener('click', () => {
      msgsRef.child(key).remove();
      rowEl.style.transition = 'opacity 0.25s, transform 0.25s';
      rowEl.style.opacity = '0';
      rowEl.style.transform = 'scale(0.95)';
      setTimeout(() => rowEl.remove(), 250);
      overlay.remove();
    });
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  function scrollDown() { msgsEl.scrollTop = msgsEl.scrollHeight; }

  msgsEl.addEventListener('click', e => {
    if (!e.target.closest('.msg-row')) {
      document.querySelectorAll('.msg-row.active').forEach(r => r.classList.remove('active'));
    }
  });

  document.getElementById('send-btn').addEventListener('click', send);
  msgInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); send(); }
  });

  function send() {
    if (!msgsRef) return;
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    const data = { name: myName, text, ts: Date.now(), type: 'msg' };
    if (replyTo) {
      data.replyTo = { name: replyTo.name, text: replyTo.text };
      replyTo = null;
      replyBar.classList.remove('show');
    }
    msgsRef.push(data);
  }

  function presence() {
    const key = myName.replace(/[.#$[\]/]/g, '_');
    myOnlineRef = onlineRef.child(key);
    myOnlineRef.set({ name: myName, ts: Date.now() });
    myOnlineRef.onDisconnect().remove();
    const pill = document.getElementById('online-pill');
    const cnt  = document.getElementById('online-count');
    pill.style.display = 'flex';
    onlineRef.on('value', s => { cnt.textContent = s.numChildren() + ' online'; });
  }

  window.addEventListener('beforeunload', () => { if (myOnlineRef) myOnlineRef.remove(); });

  function e(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

});
</script>
</body>
</html>
