<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASHMO · Class Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f0ebe0;
    --gold: #d4a843;
    --blue: #1a3a5c;
    --cream: #faf6ee;
    --dark: #111114;
    --panel: #1a1a1f;
    --border: rgba(212,168,67,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--dark);
    color: #fff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 700px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    padding: 4px 0;
    transition: opacity 0.2s;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { opacity: 0.7; }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-title span { color: var(--gold); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .online-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2ecc71;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── NAME PICKER SCREEN ── */
  #screen-name {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 24px;
    overflow-y: auto;
  }

  .name-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .name-icon { font-size: 36px; }

  .name-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.06em;
    color: var(--gold);
  }

  .name-card p {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
  }

  .name-input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.3); }
  .name-input:focus { border-color: var(--gold); }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    background: rgba(212,168,67,0.1);
    border: 1px solid rgba(212,168,67,0.25);
    color: var(--gold);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .chip:hover, .chip.active {
    background: rgba(212,168,67,0.2);
    border-color: var(--gold);
  }

  .btn-join {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-join:hover { opacity: 0.9; }
  .btn-join:active { transform: scale(0.98); }

  /* ── CHAT SCREEN ── */
  #screen-chat {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── MESSAGES ── */
  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-track { background: transparent; }
  #msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-width: 78%;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }

  .msg-sender {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    padding: 0 4px;
    letter-spacing: 0.03em;
  }
  .msg-row.mine .msg-sender { color: rgba(212,168,67,0.55); }

  .msg-bubble {
    padding: 9px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.55;
    word-break: break-word;
    max-width: 100%;
  }
  .msg-row.mine .msg-bubble {
    background: var(--gold);
    color: #000;
    border-bottom-right-radius: 4px;
  }
  .msg-row.theirs .msg-bubble {
    background: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.88);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 9px;
    color: rgba(255,255,255,0.22);
    padding: 0 4px;
  }

  .msg-system {
    align-self: center;
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 4px 12px;
    margin: 4px 0;
    font-style: italic;
  }

  .date-divider {
    align-self: center;
    font-size: 9px;
    color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 3px 10px;
    margin: 8px 0 4px;
    letter-spacing: 0.04em;
  }

  /* ── INPUT BAR ── */
  .input-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px 14px;
    background: var(--panel);
    border-top: 1px solid var(--border);
  }

  .name-tag {
    font-size: 9px;
    color: rgba(212,168,67,0.5);
    white-space: nowrap;
    padding: 0 2px;
    display: none;
  }

  #msg-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 10px 16px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }
  #msg-input::placeholder { color: rgba(255,255,255,0.25); }
  #msg-input:focus { border-color: rgba(212,168,67,0.4); }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.93); }

  /* ── LOADING STATE ── */
  #loading-msgs {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(212,168,67,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY STATE ── */
  #empty-msgs {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    text-align: center;
  }
  #empty-msgs .empty-icon { font-size: 32px; opacity: 0.4; }

  /* ── CHANGE NAME BTN ── */
  .change-name-btn {
    background: none;
    border: none;
    color: rgba(212,168,67,0.5);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0 4px;
    transition: color 0.2s;
  }
  .change-name-btn:hover { color: var(--gold); }

  /* ── RESPONSIVE ── */
  @media (min-width: 700px) {
    body { background: #080808; }
    .app {
      height: 100dvh;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
  }

  @media (max-width: 480px) {
    .topbar { padding: 12px 14px; }
    .topbar-title { font-size: 17px; }
    .name-card { padding: 24px 18px; }
    #msgs { padding: 12px 12px 6px; }
    .msg-bubble { font-size: 12px; padding: 8px 12px; }
    .input-bar { padding: 8px 10px 12px; }
    #msg-input { font-size: 12px; }
  }

  /* ── REPLY ── */
  .msg-bubble {
    cursor: default;
  }

  .reply-preview {
    border-left: 3px solid var(--gold);
    background: rgba(255,255,255,0.05);
    border-radius: 8px 8px 0 0;
    padding: 7px 12px 6px;
    margin-bottom: -6px;
    font-size: 11px;
    max-width: 100%;
    word-break: break-word;
  }
  .msg-row.mine .reply-preview {
    border-color: rgba(0,0,0,0.3);
    background: rgba(0,0,0,0.12);
  }
  .reply-preview-name {
    font-size: 9px;
    color: var(--gold);
    margin-bottom: 2px;
    letter-spacing: 0.03em;
  }
  .msg-row.mine .reply-preview-name { color: rgba(0,0,0,0.5); }
  .reply-preview-text {
    color: rgba(255,255,255,0.5);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .msg-row.mine .reply-preview-text { color: rgba(0,0,0,0.4); }

  /* Reply bar above input */
  #reply-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(212,168,67,0.07);
    border-top: 1px solid rgba(212,168,67,0.2);
    border-bottom: 1px solid rgba(212,168,67,0.1);
  }
  #reply-bar.show { display: flex; }
  #reply-bar-content {
    flex: 1;
    min-width: 0;
  }
  #reply-bar-name {
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  #reply-bar-text {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  #reply-cancel {
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  #reply-cancel:hover { color: #fff; }

  /* Swipe hint on long-press */
  .msg-row.swiping .msg-bubble {
    transform: translateX(12px);
    transition: transform 0.15s;
  }


  /* ── REPLY BUTTON (Discord style) ── */
  .msg-bubble-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
  }
  .msg-row.mine .msg-bubble-wrap { flex-direction: row-reverse; }

  .reply-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(255,255,255,0.35);
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
    padding: 0;
  }
  .msg-row:hover .reply-btn,
  .msg-row:focus-within .reply-btn { opacity: 1; }
  .reply-btn:hover {
    background: rgba(212,168,67,0.15);
    border-color: rgba(212,168,67,0.3);
    color: var(--gold);
  }
  .reply-btn:active { transform: scale(0.9); }

  /* Always show on touch devices */
  @media (hover: none) {
    .reply-btn { opacity: 1; }
  }

</style>
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn">← Back</a>
      <div class="topbar-title">ASH<span>MO</span> · Chat</div>
    </div>
    <div class="topbar-right">
      <div class="online-pill" id="online-pill" style="display:none;">
        <div class="online-dot"></div>
        <span id="online-count">0</span>
      </div>
    </div>
  </div>

  <!-- NAME PICKER SCREEN -->
  <div id="screen-name">
    <div class="name-card">
      <div class="name-icon">✏️</div>
      <h2>WHO ARE YOU?</h2>
      <p>Pick a display name. This is how your classmates will see you in the chat.</p>
      <input class="name-input" id="name-input" type="text" placeholder="Your name…" maxlength="20" autocomplete="off" />
      <div>
        <p style="font-size:10px; color:rgba(255,255,255,0.3); margin-bottom:10px;">Quick pick:</p>
        <div class="chips" id="chips">
          <div class="chip" data-name="Ayush">Ayush</div>
          <div class="chip" data-name="Satyam">Satyam</div>
          <div class="chip" data-name="Hemant">Hemant</div>
          <div class="chip" data-name="Kushal">Kushal</div>
          <div class="chip" data-name="Manav">Manav</div>
          <div class="chip" data-name="Om">Om</div>
          <div class="chip" data-name="Tejash">Tejash</div>
          <div class="chip" data-name="Shoban">Shoban</div>
          <div class="chip" data-name="Asher">Asher</div>
        </div>
      </div>
      <button class="btn-join" id="btn-join">Enter Chat ↗</button>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="screen-chat">
    <div id="msgs">
      <div id="loading-msgs">
        <div class="spinner"></div>
        Loading messages…
      </div>
      <div id="empty-msgs">
        <div class="empty-icon">💬</div>
        No messages yet.<br>Be the first to say something!
      </div>
    </div>
    <div id="reply-bar">
      <div id="reply-bar-content">
        <div id="reply-bar-name"></div>
        <div id="reply-bar-text"></div>
      </div>
      <button id="reply-cancel">✕</button>
    </div>
    <div class="input-bar">
      <span class="name-tag" id="name-tag"></span>
      <input id="msg-input" type="text" placeholder="Message the class…" maxlength="300" autocomplete="off" />
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {

  const NAME_KEY = 'ashmo_chat_name';
  const firebaseConfig = {
    apiKey: "AIzaSyC3bpQP-Wd9ZFDCnA8mdCtkqHFNznKJT9Y",
    authDomain: "ashmo-bfa52.firebaseapp.com",
    databaseURL: "https://ashmo-bfa52-default-rtdb.firebaseio.com",
    projectId: "ashmo-bfa52",
    storageBucket: "ashmo-bfa52.firebasestorage.app",
    messagingSenderId: "759282648968",
    appId: "1:759282648968:web:05f8741f493e62e7091c3d",
    measurementId: "G-578GN9BK7S"
  };

  let myName = localStorage.getItem(NAME_KEY) || '';
  let db = null, msgsRef = null, onlineRef = null, myOnlineRef = null, lastKey = null;

  const screenName = document.getElementById('screen-name');
  const screenChat = document.getElementById('screen-chat');
  const nameInput  = document.getElementById('name-input');
  const msgsEl     = document.getElementById('msgs');
  const msgInput   = document.getElementById('msg-input');
  const loadingEl  = document.getElementById('loading-msgs');
  const emptyEl    = document.getElementById('empty-msgs');

  // Pre-fill if returning user
  if (myName) nameInput.value = myName;

  // Chip selection
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      nameInput.value = chip.dataset.name;
    });
  });

  // Join
  document.getElementById('btn-join').addEventListener('click', joinChat);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

  function joinChat() {
    const val = nameInput.value.trim();
    if (!val) { nameInput.focus(); return; }
    myName = val;
    localStorage.setItem(NAME_KEY, myName);
    showChat();
  }

  // Auto-join if name stored
  if (myName) {
    showChat();
  }

  function showChat() {
    screenName.style.display = 'none';
    screenChat.style.display = 'flex';
    screenChat.style.flexDirection = 'column';
    document.getElementById('name-tag').textContent = myName;
    document.getElementById('name-tag').style.display = 'block';
    initFirebase();
    msgInput.focus();
  }

  function initFirebase() {
    if (db) return;
    try {
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      msgsRef   = db.ref('ashmo/messages');
      onlineRef = db.ref('ashmo/online');
      loadMessages();
      trackOnline();
    } catch(e) {
      console.warn('Firebase error:', e);
      loadingEl.innerHTML = '<span style="color:rgba(255,100,100,0.7)">Could not connect. Check your internet.</span>';
    }
  }

  let renderedKeys = new Set();
  let lastDate = null;

  function loadMessages() {
    // Load last 100 messages
    msgsRef.limitToLast(100).once('value', snap => {
      loadingEl.style.display = 'none';

      const items = [];
      snap.forEach(child => items.push({ key: child.key, val: child.val() }));

      if (items.length === 0) {
        emptyEl.style.display = 'flex';
      } else {
        emptyEl.style.display = 'none';
        items.forEach(item => {
          renderMsg(item.val());
          renderedKeys.add(item.key);
          lastKey = item.key;
        });
        scrollDown();
      }

      // Listen for new messages
      msgsRef.limitToLast(1).on('child_added', snap => {
        if (renderedKeys.has(snap.key)) return;
        renderedKeys.add(snap.key);
        lastKey = snap.key;
        emptyEl.style.display = 'none';
        renderMsg(snap.val());
        scrollDown();
      });
    });
  }

  let replyTo = null; // { name, text }

  function renderMsg(msg) {
    if (!msg) return;

    if (msg.type === 'system') {
      const el = document.createElement('div');
      el.className = 'msg-system';
      el.textContent = msg.text;
      msgsEl.appendChild(el);
      return;
    }

    // Date divider
    if (msg.ts) {
      const d = new Date(msg.ts);
      const dateStr = d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      if (dateStr !== lastDate) {
        const divider = document.createElement('div');
        divider.className = 'date-divider';
        divider.textContent = dateStr;
        msgsEl.appendChild(divider);
        lastDate = dateStr;
      }
    }

    const isMine = msg.name === myName;
    const row = document.createElement('div');
    row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
    const time = msg.ts ? new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';

    // Reply quote block
    let replyHTML = '';
    if (msg.replyTo) {
      replyHTML = `<div class="reply-preview">
        <div class="reply-preview-name">${esc(msg.replyTo.name)}</div>
        <div class="reply-preview-text">${esc(msg.replyTo.text)}</div>
      </div>`;
    }

    row.innerHTML =
      `<div class="msg-sender">${esc(msg.name)}</div>` +
      replyHTML +
      `<div class="msg-bubble-wrap">
        <div class="msg-bubble">${esc(msg.text)}</div>
        <button class="reply-btn" title="Reply">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
          </svg>
        </button>
      </div>` +
      `<div class="msg-time">${time}</div>`;

    // Reply button click
    const replyBtn = row.querySelector('.reply-btn');
    replyBtn.addEventListener('click', () => setReply({ name: msg.name, text: msg.text }));

    msgsEl.appendChild(row);
  }

  function setReply(msg) {
    replyTo = msg;
    document.getElementById('reply-bar').classList.add('show');
    document.getElementById('reply-bar-name').textContent = 'Replying to ' + msg.name;
    document.getElementById('reply-bar-text').textContent = msg.text;
    msgInput.focus();
  }

  document.getElementById('reply-cancel').addEventListener('click', () => {
    replyTo = null;
    document.getElementById('reply-bar').classList.remove('show');
  });

  function scrollDown() {
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  // Send
  document.getElementById('send-btn').addEventListener('click', send);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function send() {
    if (!msgsRef) return;
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';
    const msgData = { name: myName, text, ts: Date.now(), type: 'msg' };
    if (replyTo) {
      msgData.replyTo = { name: replyTo.name, text: replyTo.text };
      replyTo = null;
      document.getElementById('reply-bar').classList.remove('show');
    }
    msgsRef.push(msgData);
  }

  // Online presence
  function trackOnline() {
    if (!onlineRef || !myName) return;
    const key = myName.replace(/[.#$[\]/]/g, '_');
    myOnlineRef = onlineRef.child(key);
    myOnlineRef.set({ name: myName, ts: Date.now() });
    myOnlineRef.onDisconnect().remove();

    const pill = document.getElementById('online-pill');
    const count = document.getElementById('online-count');
    pill.style.display = 'flex';

    onlineRef.on('value', snap => {
      count.textContent = snap.numChildren() + ' online';
    });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  window.addEventListener('beforeunload', () => {
    if (myOnlineRef) myOnlineRef.remove();
  });
});
</script>
</body>
</html>
